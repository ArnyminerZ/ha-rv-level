# RV Level - chock placement dashboard card
#
# Requires the "Mushroom" custom cards (install via HACS Frontend:
# https://github.com/piitaya/lovelace-mushroom).
#
# Replace `rv_level` below with your device's entity_id slug if you renamed
# it away from the default. Replace the `image.media_content_id` with a
# top-view photo/illustration of your own vehicle (Settings -> Media, or any
# local media source) -- it is purely decorative.
type: picture-elements
elements:
  - type: custom:hui-element
    card_type: custom:mushroom-template-card
    primary: >-
      {{ 'LEVEL' if is_state(entity, 'on') else 'NOT LEVELABLE' if
      is_state('binary_sensor.rv_level_levelable', 'off') else 'NOT LEVEL' }}
    secondary: ""
    icon: >-
      {{ 'mdi:thumb-up' if is_state(entity, 'on') else 'mdi:close-octagon' if
      is_state('binary_sensor.rv_level_levelable', 'off') else 'mdi:thumb-down' }}
    entity: binary_sensor.rv_level_level
    icon_color: >-
      {{ 'blue' if is_state(entity, 'on') else 'red' if
      is_state('binary_sensor.rv_level_levelable', 'off') else 'grey' }}
    layout: vertical
    style:
      top: 50%
      left: 50%
  - type: custom:mushroom-template-card
    primary: "{{ states(entity) }} cm"
    secondary: "{{ state_attr(entity, 'chock_index') }}/3"
    icon: |-
      {% set idx = state_attr(entity, 'chock_index') | int(0) %}
      {% if idx >= 3 %}
        mdi:chevron-triple-up
      {% elif idx == 2 %}
        mdi:chevron-double-up
      {% elif idx == 1 %}
        mdi:chevron-up
      {% else %}
        mdi:circle
      {% endif %}
    entity: sensor.rv_level_front_left_chock
    icon_color: "{{ 'blue' if state_attr(entity, 'chock_index') | int(0) > 0 else 'grey' }}"
    layout: horizontal
    style:
      top: 20%
      left: 16%
      width: 100px
  - type: custom:mushroom-template-card
    primary: "{{ states(entity) }} cm"
    secondary: "{{ state_attr(entity, 'chock_index') }}/3"
    icon: |-
      {% set idx = state_attr(entity, 'chock_index') | int(0) %}
      {% if idx >= 3 %}
        mdi:chevron-triple-up
      {% elif idx == 2 %}
        mdi:chevron-double-up
      {% elif idx == 1 %}
        mdi:chevron-up
      {% else %}
        mdi:circle
      {% endif %}
    entity: sensor.rv_level_front_right_chock
    icon_color: "{{ 'blue' if state_attr(entity, 'chock_index') | int(0) > 0 else 'grey' }}"
    layout: horizontal
    style:
      top: 20%
      left: 83%
      width: 100px
  - type: custom:mushroom-template-card
    primary: "{{ states(entity) }} cm"
    secondary: "{{ state_attr(entity, 'chock_index') }}/3"
    icon: |-
      {% set idx = state_attr(entity, 'chock_index') | int(0) %}
      {% if idx >= 3 %}
        mdi:chevron-triple-up
      {% elif idx == 2 %}
        mdi:chevron-double-up
      {% elif idx == 1 %}
        mdi:chevron-up
      {% else %}
        mdi:circle
      {% endif %}
    entity: sensor.rv_level_rear_left_chock
    icon_color: "{{ 'blue' if state_attr(entity, 'chock_index') | int(0) > 0 else 'grey' }}"
    layout: horizontal
    style:
      top: 80%
      left: 16%
      width: 100px
  - type: custom:mushroom-template-card
    primary: "{{ states(entity) }} cm"
    secondary: "{{ state_attr(entity, 'chock_index') }}/3"
    icon: |-
      {% set idx = state_attr(entity, 'chock_index') | int(0) %}
      {% if idx >= 3 %}
        mdi:chevron-triple-up
      {% elif idx == 2 %}
        mdi:chevron-double-up
      {% elif idx == 1 %}
        mdi:chevron-up
      {% else %}
        mdi:circle
      {% endif %}
    entity: sensor.rv_level_rear_right_chock
    icon_color: "{{ 'blue' if state_attr(entity, 'chock_index') | int(0) > 0 else 'grey' }}"
    layout: horizontal
    style:
      top: 80%
      left: 83%
      width: 100px
image: /local/your-vehicle-top-view.png
grid_options:
  rows: auto
  columns: 12
