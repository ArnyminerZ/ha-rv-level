# RV Level - bubble level dashboard card
#
# Requires the "html-card" custom card (install "html-card" via HACS
# Frontend, e.g. https://github.com/pkozul/ha-html-card).
#
# Replace `rv_level` below with your device's entity_id slug if you
# renamed it away from the default ("RV Level" -> rv_level). It is easiest
# to check under Settings -> Devices & services -> RV Level -> the entity
# list, and look at the prefix shared by all entities.
#
# Note: this card positions the bubble at the same px-per-degree scale as
# the dashed "level zone" circle, so the zone boundary is exactly where the
# bubble stops being centered -- keep the two `* 90` / `* 180` factors below
# in sync if you change bubble_max_angle in a fork of the integration.
type: custom:html-card
title: Level
content: >
  {% set bubble = states.sensor.rv_level_bubble_position %}
  {% set x = bubble.attributes.x | float(0) %}
  {% set y = bubble.attributes.y | float(0) %}
  {% set pitch_margin = bubble.attributes.pitch_margin | float(1.5) %}
  {% set roll_margin = bubble.attributes.roll_margin | float(1.5) %}
  {% set max_angle = bubble.attributes.bubble_max_angle | float(6.0) %}
  {% set is_level = is_state('binary_sensor.rv_level_level', 'on') %}
  {% set left = (97 + x * 90) | round(1) %}
  {% set top = (97 + y * 90) | round(1) %}
  {% set zone_w = ((roll_margin / max_angle) * 180) | round(1) %}
  {% set zone_h = ((pitch_margin / max_angle) * 180) | round(1) %}
  {% set color = '#2ecc71' if is_level else '#e74c3c' %}
  <div style="position:relative;width:220px;height:220px;margin:8px
  auto;border-radius:50%;background:radial-gradient(circle,#ffffff10,#80808022);border:2px
  solid #888;">
    <div style="position:absolute;left:110px;top:14px;bottom:14px;width:1px;background:#8888;"></div>
    <div style="position:absolute;top:110px;left:14px;right:14px;height:1px;background:#8888;"></div>
    <div style="position:absolute;left:50%;top:50%;width:{{ zone_w }}px;height:{{ zone_h }}px;transform:translate(-50%,-50%);border:1.5px dashed #2ecc71;border-radius:50%;"></div>
    <div style="position:absolute;left:{{ left }}px;top:{{ top }}px;width:26px;height:26px;border-radius:50%;background:{{ color }};opacity:.85;border:1.5px solid #1b1b1b;transition:left .2s ease,top .2s ease;"></div>
  </div>
